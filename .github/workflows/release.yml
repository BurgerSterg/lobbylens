name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set version from tag
        run: |
          $tag = "${{ github.ref_name }}" -replace '^v', ''
          (Get-Content package.json) -replace '"version": "[^"]*"', "`"version`": `"$tag`"" | Set-Content package.json
          (Get-Content src-tauri/tauri.conf.json) -replace '"version": "[^"]*"', "`"version`": `"$tag`"" | Set-Content src-tauri/tauri.conf.json
        shell: pwsh

      - name: Install dependencies
        run: npm install

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: BurgerLens ${{ github.ref_name }}
          releaseDraft: false
          prerelease: false
          updaterJsonPreferNsis: true